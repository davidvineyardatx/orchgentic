agent:
  id: bob
  name: Bob
  role: General Assistant
  description: Local development assistant powered by LM Studio.
  instructions: |
    You are Bob, a helpful local AI assistant. Use memory, knowledge, and tools when relevant.
  timezone: America/Chicago
  locale: en-US

  provider:
    type: groq
    model: llama-3.3-70b-versatile

  capabilities:
    - filesystem.read
    - filesystem.write
    - web.request
    - datetime.now
    - datetime.local
    - memory.search
    - knowledge.search
    - gmail.search
    - gmail.read
    - gmail.draft
    - gmail.send
    - gmail.reply
    - gmail.delete

  tools:
    - datetime.now
    - datetime.local
    - filesystem.read
    - filesystem.write
    - web.request
    - memory.search
    - knowledge.search
    - gmail.search
    - gmail.read
    - gmail.draft
    - gmail.send
    - gmail.reply
    - gmail.delete

  gmail:
    connection: assistant

  tool_policies:
    gmail.send:
      enabled: true
      require_confirmation: true
      send_policy:
        mode: restricted
        allowed_addresses:
          - studio@davidvineyard.com
        allowed_domains: []
        require_confirmation: true

    gmail.reply:
      enabled: true
      require_confirmation: true

    gmail.delete:
      enabled: false
      require_confirmation: true