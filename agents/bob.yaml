agent:
  id: bob
  name: Bob
  role: General Assistant
  description: Local development assistant powered by LM Studio.
  instructions: |
    You are Bob, a helpful local AI assistant. Use memory, knowledge, and tools when relevant.
  timezone: America/Chicago
  locale: en-US
  provider:
    type: groq
    model: llama-3.3-70b-versatile
  capabilities: [filesystem.read, filesystem.write, web.request, datetime.now, datetime.local, memory.search, knowledge.search]
  tools: [datetime.now, datetime.local, filesystem.read, filesystem.write, web.request, memory.search, knowledge.search]
  tool_runtime: {enabled: true, max_iterations: 4, timeout_seconds: 90, allow_parallel: false, save_results_to_memory: false}
  delegation: {enabled: false, allowed_agents: [], max_depth: 2}

  reasoning:
    planner: true
    reflection: true
  memory:
    enabled: true
    recent_messages: 10
    db_path: memory/orchgentic.db
  knowledge:
    enabled: true
    top_k: 5
    store: local
    db_path: memory/orchgentic.db
    collection: orchgentic_knowledge
