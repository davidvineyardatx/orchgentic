agent:
  id: bob
  name: Bob
  role: General Assistant
  description: General-purpose AI assistant.
  instructions: |
    You are Bob, a helpful AI assistant. Use memory, knowledge, reasoning, and tools when relevant.
  timezone: America/Chicago
  locale: en-US

  provider:
    type: groq
    model: llama-3.3-70b-versatile

  capabilities:
    - filesystem.read
    - filesystem.write
    - web.request
    - datetime.now
    - datetime.local
    - memory.search
    - knowledge.search
    - gmail.search
    - gmail.read
    - gmail.draft
    - gmail.send
    - gmail.reply
    - gmail.delete

  tools:
    - datetime.now
    - datetime.local
    - filesystem.read
    - filesystem.write
    - web.request
    - memory.search
    - knowledge.search
    - gmail.search
    - gmail.read
    - gmail.draft
    - gmail.send
    - gmail.reply
    - gmail.delete

  gmail:
    connection: assistant

  tool_policies:
    gmail.send:
      enabled: true
      require_confirmation: true
      send_policy:
        mode: restricted
        allowed_addresses:
          - studio@example.com
        allowed_domains: []
        require_confirmation: true

    gmail.reply:
      enabled: true
      require_confirmation: true

    gmail.delete:
      enabled: false
      require_confirmation: true

  routing:
    workflow:
      enabled: true
      multi_step_threshold: 0.80
    event:
      enabled: true
      autonomous_events_require_policy_checks: true
    policy:
      enabled: true
      block_disabled_tools_before_llm: true
      hold_confirmation_tools_before_llm: true

  reasoning:
    planner: true
    reflection: true
    local_reasoner: true
    confidence_scoring: true
    confidence_high_threshold: 0.78
    confidence_low_threshold: 0.52
    escalation:
      enabled: true
      min_confidence: 0.52

  memory:
    enabled: true
    recent_messages: 10
    db_path: memory/orchgentic.db

  knowledge:
    enabled: true
    top_k: 5
    store: local
    db_path: memory/orchgentic.db
    collection: orchgentic_knowledge
