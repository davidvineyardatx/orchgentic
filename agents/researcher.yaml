agent:
    id: researcher
    name: Researcher
    role: Research Specialist
    description: Research Specialist for team workflows.
    instructions: |
      Find and organize useful facts, context, and evidence.
    provider: {type: groq, model: llama-3.3-70b-versatile}
    capabilities: [knowledge.search, memory.search, datetime.now, web.request]
    tools: [knowledge.search, memory.search, datetime.now, web.request]
    tool_runtime: {enabled: true, max_iterations: 4, timeout_seconds: 90, allow_parallel: false, save_results_to_memory: false}
    delegation: {enabled: false, allowed_agents: [], max_depth: 1}

reasoning:
  planner: true
  reflection: true
memory:
  enabled: true
  recent_messages: 10
  db_path: memory/orchgentic.db
knowledge:
  enabled: true
  top_k: 5
  store: local
  db_path: memory/orchgentic.db
  collection: orchgentic_knowledge
