deterministic_router:
  enabled: true

  fallback_to_llm_terms:
    - summarize
    - summary
    - analyse
    - analyze
    - explain
    - rewrite
    - classify
    - recommend
    - compare
    - interpret
    - generate
    - write a response
    - draft a response
    - draft content creatively
    - summarize body
    - summarize body content
    - summarize email
    - summarize message

  deterministic_safe_terms:
    - what time
    - current time
    - what day
    - current date
    - search gmail
    - read gmail message
    - count gmail
    - show subject lines

  thresholds:
    deterministic_min_confidence: 0.90
    local_reasoner_min_confidence: 0.70

  behavior:
    allow_tool_prefetch_before_llm: false
    log_routes: true


token_estimation:
  enabled: true
  chars_per_token: 4
  default_completion_tokens: 300
  include_memory_context: true
  include_tool_schema_context: true


local_reasoner:
  enabled: true
  mode: advisory
  confidence_threshold: 0.70
  deterministic_threshold: 0.90

escalation:
  enabled: true
  mode: advisory
  external_llm_on_generation: true
  external_llm_on_analysis: true
  external_llm_on_low_confidence: true
