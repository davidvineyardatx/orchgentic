<svg width="1400" height="1000" viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0b0f17; }
      .box { fill: #111827; stroke: #334155; stroke-width: 2; rx: 16; }
      .core { fill: #162033; stroke: #60a5fa; stroke-width: 3; rx: 18; }
      .future { fill: #111827; stroke: #475569; stroke-width: 2; stroke-dasharray: 8 6; rx: 16; }
      .title { fill: #f8fafc; font: 700 34px Inter, Arial, sans-serif; }
      .subtitle { fill: #cbd5e1; font: 400 17px Inter, Arial, sans-serif; }
      .label { fill: #f8fafc; font: 700 18px Inter, Arial, sans-serif; }
      .small { fill: #cbd5e1; font: 400 14px Inter, Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 400 12px Inter, Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #60a5fa; stroke-width: 2.5; fill: none; marker-end: url(#arrowheadBlue); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowhead); }
      .groupTitle { fill: #93c5fd; font: 700 15px Inter, Arial, sans-serif; letter-spacing: .5px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="1000"/>
  <text x="70" y="65" class="title">Orchgentic Architecture</text>
  <text x="70" y="95" class="subtitle">Open-source orchestration runtime for autonomous and multi-agent AI systems</text>

  <!-- Entry / Config -->
  <rect x="70" y="140" width="250" height="120" class="box"/>
  <text x="95" y="172" class="groupTitle">ENTRY POINTS</text>
  <text x="95" y="205" class="label">orch CLI</text>
  <text x="95" y="230" class="small">manual runs • tools</text>
  <text x="95" y="250" class="small">triggers • webhooks</text>

  <rect x="70" y="310" width="250" height="170" class="box"/>
  <text x="95" y="342" class="groupTitle">YAML CONFIGURATION</text>
  <text x="95" y="375" class="label">Agents</text>
  <text x="95" y="397" class="small">role • provider • tools</text>
  <text x="95" y="418" class="small">timezone • memory</text>
  <text x="95" y="450" class="label">Teams + Triggers</text>
  <text x="95" y="472" class="small">orchestrator • members</text>

  <!-- Core -->
  <rect x="420" y="210" width="360" height="300" class="core"/>
  <text x="455" y="250" class="groupTitle">CORE RUNTIME</text>
  <text x="455" y="288" class="label">Orchgentic Core</text>
  <text x="455" y="320" class="small">Planning + Reflection</text>
  <text x="455" y="345" class="small">Tool continuation loop</text>
  <text x="455" y="370" class="small">Capability preflight</text>
  <text x="455" y="395" class="small">Time context resolver</text>
  <text x="455" y="420" class="small">Error policy + notification stubs</text>
  <text x="455" y="445" class="small">Shared orchestration context</text>

  <!-- Providers -->
  <rect x="890" y="120" width="240" height="150" class="box"/>
  <text x="920" y="152" class="groupTitle">LLM PROVIDERS</text>
  <text x="920" y="185" class="label">Groq</text>
  <text x="920" y="210" class="label">OpenAI</text>
  <text x="920" y="235" class="small">future provider adapters</text>

  <!-- Tools -->
  <rect x="890" y="320" width="320" height="240" class="box"/>
  <text x="920" y="352" class="groupTitle">TOOL LAYER</text>
  <text x="920" y="385" class="label">filesystem.read / write</text>
  <text x="920" y="415" class="label">web.request</text>
  <text x="920" y="445" class="label">datetime.now / local</text>
  <text x="920" y="475" class="label">memory.search</text>
  <text x="920" y="505" class="label">knowledge.search</text>
  <text x="920" y="535" class="label">delegate.agent</text>

  <!-- State -->
  <rect x="890" y="610" width="320" height="180" class="box"/>
  <text x="920" y="642" class="groupTitle">STATE + KNOWLEDGE</text>
  <text x="920" y="675" class="label">Episodic Memory</text>
  <text x="920" y="700" class="small">SQLite-backed runtime memory</text>
  <text x="920" y="735" class="label">Semantic Knowledge</text>
  <text x="920" y="760" class="small">local vector store • Zilliz-ready</text>

  <!-- Orchestration -->
  <rect x="260" y="620" width="500" height="230" class="box"/>
  <text x="295" y="652" class="groupTitle">MULTI-AGENT ORCHESTRATION</text>
  <circle cx="360" cy="725" r="38" fill="#1e293b" stroke="#60a5fa" stroke-width="3"/>
  <text x="327" y="731" class="small">Manager</text>
  <circle cx="500" cy="695" r="34" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="470" y="701" class="small">Research</text>
  <circle cx="500" cy="780" r="34" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="476" y="786" class="small">Writer</text>
  <circle cx="640" cy="735" r="34" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="610" y="741" class="small">Reviewer</text>
  <rect x="430" y="820" width="210" height="42" class="box"/>
  <text x="462" y="847" class="small">Shared Context</text>

  <!-- Future -->
  <rect x="70" y="875" width="1140" height="85" class="future"/>
  <text x="100" y="910" class="groupTitle">ROADMAP PLATFORM LAYERS</text>
  <text x="100" y="940" class="small">Workflow/DAG Engine • Plugin SDK • API Server • No-Code Studio • Observability Dashboard • Distributed Execution</text>

  <!-- Arrows -->
  <path d="M320 200 C355 200 380 250 420 285" class="arrow"/>
  <path d="M320 390 C365 390 380 380 420 370" class="arrow"/>
  <path d="M780 285 C830 245 850 210 890 195" class="arrow2"/>
  <path d="M780 390 C825 400 850 420 890 435" class="arrow2"/>
  <path d="M1050 560 C1050 585 1050 590 1050 610" class="arrow"/>
  <path d="M600 510 C575 560 540 590 510 620" class="arrow2"/>
  <path d="M780 470 C830 550 845 650 890 700" class="arrow"/>
  <path d="M600 510 C590 705 610 835 640 875" class="dash"/>

  <!-- internal orchestration arrows -->
  <path d="M398 718 C425 710 440 704 466 698" class="arrow"/>
  <path d="M398 735 C426 752 438 764 466 775" class="arrow"/>
  <path d="M534 704 C565 710 585 720 607 730" class="arrow"/>
  <path d="M534 782 C565 775 590 758 607 745" class="arrow"/>
  <path d="M500 815 C505 823 512 828 522 830" class="arrow"/>
  <path d="M640 770 C620 810 590 823 560 830" class="arrow"/>

  <!-- Footer -->
  <text x="70" y="985" class="tiny">Developer Preview v0.7.5-alpha • CLI-first runtime • YAML-first configuration</text>
</svg>