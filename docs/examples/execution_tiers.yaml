# Execution tier examples for Orchgentic.
#
# These examples are readiness/configuration examples only.
# They do not enable local LLM execution by themselves.

# Default posture: deterministic + local reasoning enabled, local LLM disabled.
default_disabled:
  execution_tiers:
    deterministic:
      enabled: true

    local_reasoning:
      enabled: true

    local_llm:
      enabled: false
      provider: lmstudio
      model: null
      eligible_for:
        - classification
        - routing
        - summarization
        - review

    external_llm:
      enabled: true
      require_for:
        - complex_generation
        - high_uncertainty_reasoning

    premium_model:
      enabled: true
      require_for:
        - final_synthesis
        - executive_output
        - high_quality_final


# LM Studio readiness example.
# Runtime routing remains unchanged until local LLM execution is implemented.
lmstudio_ready:
  execution_tiers:
    local_llm:
      enabled: true
      provider: lmstudio
      model: qwen3
      eligible_for:
        - routing
        - classification
        - summarization
        - review


# Ollama readiness example.
ollama_ready:
  execution_tiers:
    local_llm:
      enabled: true
      provider: ollama
      model: llama3.1
      eligible_for:
        - routing
        - classification
        - review


# OpenAI-compatible local/edge endpoint readiness example.
openai_compatible_ready:
  execution_tiers:
    local_llm:
      enabled: true
      provider: openai_compatible
      model: local-model
      eligible_for:
        - routing
        - classification
        - summarization
        - review
